---

services:
  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    container_name: seerr
    healthcheck:
      test: curl -f http://localhost:5055/ || exit 1
    restart: always
    init: true
    ports:
      - 5055:5055
    environment:
      LOG_LEVEL: debug
      TZ: "${TESSERACT_TZ}"
    volumes:
      - "${TESSERACT_APPDATA_PATH}/seerr_config:/app/config"

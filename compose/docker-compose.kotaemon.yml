---

services:
  kotaemon:
    image: ghcr.io/cinnamon/kotaemon:latest
    container_name: kotaemon
    healthcheck:
      test: curl -f http://localhost:7860/ || exit 1
    restart: always
    ports:
      - 7860:7860
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860

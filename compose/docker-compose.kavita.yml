---

services:
  kavita:
    image: kizaing/kavita:latest
    container_name: kavita
    healthcheck:
      test: curl -f http://localhost:5000/ || exit 1
    restart: always
    ports:
      - "5000:5000"
    volumes:
      - ./manga:/manga
      - "${TESSERACT_DATA_PATH}/Ebooks:/books"
      - ${TESSERACT_APPDATA_PATH}/kavita_config:/kavita/config
